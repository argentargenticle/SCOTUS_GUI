<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SCOTUS Case Reviewer</title>
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
    </head>
    <body>
        <div class="w3-bar w3-deep-purple">
            <a href="index.html" class="w3-bar-item w3-button">Home</a>
        </div>        
        <ul class="w3-ul" id="listCards">
        </ul>        
        <script>
            getListCases();
            async function getListCases(){
                try{
                    const response = await fetch("https://raw.githubusercontent.com/argentargenticle/SCOTUS_Info/refs/heads/main/rulings/2025-26/master_list.json");
                    const data = await response.json();
                    const container = document.getElementById("listCards");
                    data.cases.forEach(element => {
                        container.innerHTML += 
                        `<li class="w3-card w3-padding-large">
                            <h1><a href="docketNumber.html?docketNumber=${element.docket_number}">${element.case_name}</a></h2>
                            <ul>
                                <li>Docket Number: ${element.docket_number}</li>
                                <li>Status: ${element.status}</li>
                                <li>Ruling: ${element.ruling}</li>
                                <li>Reasoning: ${element.held}</li>
                            </ul>
                        </li>`;
                    });
                }catch(error){
                    console.error(error);
                }
            }
        </script>
    </body>
</html>
